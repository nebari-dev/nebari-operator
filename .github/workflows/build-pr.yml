name: PR Checks

on:
  pull_request:
    branches:
      - main
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - 'Makefile'
      - '.github/workflows/**'
      - 'test/**'
      - 'cmd/**'
      - 'api/**'
      - 'internal/**'
      - 'hack/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  pull-requests: write

env:
  REGISTRY: quay.io
  IMAGE_NAME: nebari/nebari-operator

jobs:
  lint:
    name: Lint and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run fmt check
        run: |
          make fmt
          git diff --exit-code || (echo "Code is not formatted. Run 'make fmt'" && exit 1)

      - name: Run vet
        run: make vet

      - name: Run linter
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.5.0

      - name: Generate manifests
        run: make manifests

      - name: Check for manifest changes
        run: |
          git diff --exit-code || (echo "Manifests are out of date. Run 'make manifests'" && exit 1)

      - name: Generate code
        run: make generate

      - name: Check for generated code changes
        run: |
          git diff --exit-code || (echo "Generated code is out of date. Run 'make generate'" && exit 1)

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run tests
        run: make test

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      CLUSTER_NAME: test-cluster
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Create KinD Cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: test-cluster

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build operator image with cache
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: quay.io/nebari/nebari-operator:v0.0.1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Load image to KinD
        run: |
          kind load docker-image quay.io/nebari/nebari-operator:v0.0.1 --name test-cluster

      - name: Install MetalLB
        run: |
          kubectl apply -f https://raw.githubusercontent.com/metallb/metallb/v0.14.8/config/manifests/metallb-native.yaml
          kubectl wait --namespace metallb-system \
            --for=condition=available deployment/controller \
            --timeout=90s
          kubectl wait --namespace metallb-system \
            --for=jsonpath='{.status.numberReady}'=1 \
            daemonset/speaker \
            --timeout=90s

      - name: Configure MetalLB IP pool
        run: |
          KIND_NET_CIDR=$(docker network inspect kind -f '{{range .IPAM.Config}}{{.Subnet}}{{"\n"}}{{end}}' | grep '\.' | head -n1)
          BASE_IP=$(echo "${KIND_NET_CIDR}" | awk -F. '{print $1"."$2}')
          kubectl apply -f - <<EOF
          apiVersion: metallb.io/v1beta1
          kind: IPAddressPool
          metadata:
            name: kind-pool
            namespace: metallb-system
          spec:
            addresses:
              - ${BASE_IP}.255.200-${BASE_IP}.255.250
          ---
          apiVersion: metallb.io/v1beta1
          kind: L2Advertisement
          metadata:
            name: kind-l2
            namespace: metallb-system
          spec:
            ipAddressPools:
              - kind-pool
          EOF

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install foundational services
        run: dev/scripts/services/install.sh

      - name: Setup Keycloak realm
        run: dev/scripts/services/keycloak/setup.sh

      - name: Deploy operator to cluster
        env:
          IMG: quay.io/nebari/nebari-operator:v0.0.1
        run: make deploy

      - name: Check operator deployment status
        if: always()
        run: |
          echo "=== Checking operator deployment ==="
          kubectl get deployment -n nebari-operator-system
          kubectl get pods -n nebari-operator-system
          echo ""
          echo "=== Operator pod logs ==="
          kubectl logs -n nebari-operator-system -l control-plane=controller-manager --tail=50 || true
          echo ""
          echo "=== Operator pod events ==="
          kubectl get events -n nebari-operator-system --sort-by='.lastTimestamp' || true

      - name: Wait for operator to be ready
        run: |
          kubectl wait --for=condition=available deployment/nebari-operator-controller-manager \
            -n nebari-operator-system --timeout=180s

      - name: Run operator E2E tests
        env:
          USE_EXISTING_CLUSTER: "true"
          CLUSTER_NAME: test-cluster
          SKIP_DOCKER_BUILD: "true"
          IMG: quay.io/nebari/nebari-operator:v0.0.1
        run: |
          go mod tidy
          make test-e2e

  test-chart:
    name: Helm Chart Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install kubebuilder
        run: |
          curl -L -o kubebuilder "https://go.kubebuilder.io/dl/latest/$(go env GOOS)/$(go env GOARCH)"
          chmod +x kubebuilder
          sudo mv kubebuilder /usr/local/bin/

      - name: Generate Helm chart
        run: make helm-chart

      - name: Lint Helm Chart
        run: helm lint ./dist/chart

      - name: Create KinD Cluster
        id: kind
        uses: helm/kind-action@v1
        with:
          cluster_name: test-cluster

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build nebari-operator image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: nebari-operator:v0.1.0
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Load image to KinD
        run: |
          kind load docker-image nebari-operator:v0.1.0 --name test-cluster

      - name: Install Helm chart for project
        run: |
          helm install my-release ./dist/chart --create-namespace --namespace nebari-operator-system

      - name: Check Helm release status
        run: |
          helm status my-release --namespace nebari-operator-system

  build-multiarch:
    name: Build & Push (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: [test-chart, test, test-e2e]
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        id: login
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract branch name
        id: branch
        run: |
          # Get branch name and sanitize it for use as Docker tag
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          # Replace / with - and remove special characters
          TAG_NAME=$(echo "$BRANCH_NAME" | sed 's/\//-/g' | sed 's/[^a-zA-Z0-9._-]//g')
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Branch: $BRANCH_NAME -> Tag: $TAG_NAME"

      - name: Build and push by digest
        id: build
        if: steps.login.outcome == 'success'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          provenance: false
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Build Docker image (without push)
        if: steps.login.outcome != 'success'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.branch.outputs.tag }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          provenance: false

      - name: Export digest
        if: steps.login.outcome == 'success'
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        if: steps.login.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-manifest:
    name: Create Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: build-multiarch
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        id: login
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Extract branch name
        id: branch
        run: |
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          TAG_NAME=$(echo "$BRANCH_NAME" | sed 's/\//-/g' | sed 's/[^a-zA-Z0-9._-]//g')
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Download digests
        if: steps.login.outcome == 'success'
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digest-*
          merge-multiple: true

      - name: Create manifest list and push
        if: steps.login.outcome == 'success'
        run: |
          cd ${{ runner.temp }}/digests
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.branch.outputs.tag }} \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect manifest
        if: steps.login.outcome == 'success'
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.branch.outputs.tag }}

      - name: Build summary
        if: steps.login.outcome == 'success'
        run: |
          echo "### Operator Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ steps.branch.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.branch.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms**: linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY

  comment-pr:
    name: Comment on PR
    runs-on: ubuntu-latest
    needs: [merge-manifest]
    steps:
      - name: Extract branch name
        id: branch
        run: |
          BRANCH_NAME="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          TAG_NAME=$(echo "$BRANCH_NAME" | sed 's/\//-/g' | sed 's/[^a-zA-Z0-9._-]//g')
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const branchTag = '${{ steps.branch.outputs.tag }}';
            const operatorImage = '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:' + branchTag;

            const comment = `### Docker Images Built

            Images pushed to Quay.io for branch \`${branchTag}\`:

            | Image | Tag | Platforms |
            |-------|-----|-----------|
            | Operator | \`${operatorImage}\` | linux/amd64 + linux/arm64 |

            **Test the operator:**
            \`\`\`bash
            kubectl apply -k https://github.com/${{ github.repository }}.git/config/default?ref=${{ github.head_ref || github.ref_name }}
            kubectl set image deployment/nebari-operator-controller-manager manager=${operatorImage} -n nebari-operator-system
            \`\`\`
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
