name: Release

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  REGISTRY: quay.io
  IMAGE_NAME: nebari/nebari-operator

jobs:
  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run fmt check
        run: |
          make fmt
          git diff --exit-code || (echo "Code is not formatted. Run 'make fmt'" && exit 1)

      - name: Run vet
        run: make vet

      - name: Run tests
        run: make test

      - name: Run linter
        run: make lint

  build-manifests:
    name: Build Manifests
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Generate manifests and code
        run: |
          make manifests
          make generate

      - name: Build installer YAML
        run: make build-installer IMG="${REGISTRY}/${IMAGE_NAME}:${GITHUB_REF_NAME}"

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/install.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  goreleaser:
    name: Release Binaries and Docker Images
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU for multi-arch builds
        uses: docker/setup-qemu-action@v3

      - name: Log in to Quay.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-helm-chart:
    name: Package and Publish Helm Chart
    runs-on: ubuntu-latest
    needs: [tests, goreleaser, build-manifests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: 'latest'

      - name: Install kubebuilder
        run: |
          curl -L -o kubebuilder "https://go.kubebuilder.io/dl/latest/$(go env GOOS)/$(go env GOARCH)"
          chmod +x kubebuilder
          sudo mv kubebuilder /usr/local/bin/

      - name: Generate Helm chart
        run: |
          make build-installer IMG="${REGISTRY}/${IMAGE_NAME}:${GITHUB_REF_NAME}"
          make helm-chart

      - name: Update Chart version and appVersion
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          make helm-chart-version VERSION="${VERSION}" APP_VERSION="${GITHUB_REF_NAME}"

      - name: Package Helm chart
        run: make helm-package

      - name: Upload Helm chart to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-helm-repository:
    name: Sync Chart to Helm Repository
    runs-on: ubuntu-latest
    needs: publish-helm-chart
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: 'latest'

      - name: Install kubebuilder
        run: |
          curl -L -o kubebuilder "https://go.kubebuilder.io/dl/latest/$(go env GOOS)/$(go env GOARCH)"
          chmod +x kubebuilder
          sudo mv kubebuilder /usr/local/bin/

      - name: Generate Helm chart
        run: |
          make build-installer IMG="${REGISTRY}/${IMAGE_NAME}:${GITHUB_REF_NAME}"
          make helm-chart

      - name: Update Chart version and appVersion
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          make helm-chart-version VERSION="${VERSION}" APP_VERSION="${GITHUB_REF_NAME}"

      - name: Sync chart to helm-repository
        uses: nebari-dev/helm-repository/.github/actions/sync-chart@main
        with:
          chart-path: dist/chart
          chart-name: nebari-operator
          token: ${{ secrets.NEBARI_HELM_REPO_TOKEN }}
