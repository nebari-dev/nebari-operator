<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebari Portal</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <h1 class="logo">Nebari Portal</h1>
                <div class="auth-section">
                    <div id="user-info" class="user-info hidden">
                        <span id="user-name"></span>
                        <span id="user-groups" class="user-groups"></span>
                        <button id="sign-out-btn" class="btn btn-secondary">Sign Out</button>
                    </div>
                    <button id="sign-in-btn" class="btn btn-primary">Sign In</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <section id="public-section" class="services-section">
            <h2>Public Services</h2>
            <p class="section-description">Available to everyone</p>
            <div id="public-services" class="services-grid">
                <div class="loading">Loading services...</div>
            </div>
        </section>

        <section id="authenticated-section" class="services-section hidden">
            <h2>Your Services</h2>
            <p class="section-description">Available to authenticated users</p>
            <div id="authenticated-services" class="services-grid">
                <div class="loading">Loading services...</div>
            </div>
        </section>

        <section id="private-section" class="services-section hidden">
            <h2>Private Services</h2>
            <p class="section-description">Restricted to specific groups</p>
            <div id="private-services" class="services-grid">
                <div class="loading">Loading services...</div>
            </div>
        </section>

        <section id="error-section" class="error-section hidden">
            <div class="error-message">
                <h3>Error Loading Services</h3>
                <p id="error-text"></p>
                <button id="retry-btn" class="btn btn-primary">Retry</button>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Nebari. All rights reserved.</p>
        </div>
    </footer>

    <script src="/static/js/app.js"></script>
</body>

</html>
