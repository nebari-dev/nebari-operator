  #   groups: [admin, viewer]
  #   keycloakConfig:
  #     groups:
  #       - name: admin
  #         members: [nebari-admin]
  #       - name: viewer
  #     clientScopes:
  #       - name: groups
  #         protocolMappers:
  #           - name: group-membership
