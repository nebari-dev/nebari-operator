{{- if and .Values.navigator.enable .Values.navigator.nebariApp.enable }}
apiVersion: reconcilers.nebari.dev/v1
kind: NebariApp
metadata:
    labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/name: {{ include "nebari-operator.name" . }}
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: navigator
    name: {{ include "nebari-operator.resourceName" (dict "suffix" "navigator" "context" $) }}
    namespace: {{ .Release.Namespace }}
spec:
    hostname: {{ .Values.navigator.nebariApp.hostname | quote }}
    service:
        name: {{ include "nebari-operator.resourceName" (dict "suffix" "navigator" "context" $) }}
        port: {{ .Values.navigator.service.port }}
    routing:
        tls:
            enabled: true
    auth:
        enabled: false
    landingPage:
        enabled: true
        displayName: "Nebari Portal"
        description: "Central hub for all Nebari services"
        icon: "dashboard"
        category: "Platform"
        priority: 1
        visibility: "public"
{{- end }}
