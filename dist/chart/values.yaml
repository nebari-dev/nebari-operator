## String to partially override chart.fullname template (will maintain the release name)
##
# nameOverride: ""

## String to fully override chart.fullname template
##
# fullnameOverride: ""

## Configure the controller manager deployment
##
manager:
  replicas: 1

  image:
    repository: controller
    tag: latest
    pullPolicy: IfNotPresent

  ## Arguments
  ##
  args:
    - --leader-elect

  ## Environment variables
  ##
  env:
    - name: KEYCLOAK_ENABLED
      value: "true"
    - name: KEYCLOAK_URL
      value: http://keycloak-keycloakx-http.keycloak.svc.cluster.local/auth
    - name: KEYCLOAK_REALM
      value: nebari
    - name: KEYCLOAK_ADMIN_SECRET_NAME
      value: nebari-realm-admin-credentials
    - name: KEYCLOAK_ADMIN_SECRET_NAMESPACE
      value: keycloak

  ## Image pull secrets
  ##
  imagePullSecrets: []

  ## Pod-level security settings
  ##
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
        type: RuntimeDefault

  ## Container-level security settings
  ##
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
        drop:
            - ALL
    readOnlyRootFilesystem: true

  ## Resource limits and requests
  ##
  resources:
    limits:
        cpu: 500m
        memory: 128Mi
    requests:
        cpu: 10m
        memory: 64Mi

  ## Manager pod's affinity
  ##
  affinity: {}

  ## Manager pod's node selector
  ##
  nodeSelector: {}

  ## Manager pod's tolerations
  ##
  tolerations: []

## Helper RBAC roles for managing custom resources
##
rbacHelpers:
  # Install convenience admin/editor/viewer roles for CRDs
  enable: false

## Custom Resource Definitions
##
crd:
  # Install CRDs with the chart
  enable: true
  # Keep CRDs when uninstalling
  keep: true

## Controller metrics endpoint.
## Enable to expose /metrics endpoint with RBAC protection.
##
metrics:
  enable: true
  # Metrics server port
  port: 8443

## Cert-manager integration for TLS certificates.
## Required for webhook certificates and metrics endpoint certificates.
##
certManager:
  enable: false

## Prometheus ServiceMonitor for metrics scraping.
## Requires prometheus-operator to be installed in the cluster.
##
prometheus:
  enable: false

## Navigator — the Nebari landing-page and service-discovery backend.
## When enabled, deploys the navigator binary alongside the operator
## so users get a single Helm release for the full platform.
##
navigator:
  # Set to true to deploy the navigator.
  enable: false

  # Override the resource names (deployment, service, serviceaccount, rbac) produced
  # by the Helm release-scoped naming. Useful for local dev and E2E rendering where
  # simple, predictable names are preferred. Leave empty for standard Helm behaviour.
  nameOverride: ""

  replicas: 1

  image:
    repository: quay.io/nebari/navigator
    tag: latest
    pullPolicy: IfNotPresent

  ## Environment variables forwarded to the container.
  ## KEYCLOAK_URL, KEYCLOAK_REALM, PORT, ENABLE_AUTH and HEALTH_INTERVAL are
  ## the recognised flags; add extra entries freely.
  ##
  env:
    - name: KEYCLOAK_URL
      value: "https://keycloak.nebari.example.com"
    - name: KEYCLOAK_REALM
      value: "nebari"
    - name: PORT
      value: "8080"
    - name: ENABLE_AUTH
      value: "true"
    - name: HEALTH_INTERVAL
      value: "30"

  ## Image pull secrets
  ##
  imagePullSecrets: []

  ## Resource limits and requests
  ##
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  ## Pod-level security settings
  ##
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    seccompProfile:
      type: RuntimeDefault

  ## Container-level security settings
  ##
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true

  ## Kubernetes Service configuration
  ##
  service:
    type: ClusterIP
    port: 8080

  ## NebariApp CR that registers the landing page with the operator.
  ## The operator must be running for this resource to be accepted.
  ##
  nebariApp:
    # Create the NebariApp registration for the landing page itself.
    enable: true
    hostname: "navigator.nebari.example.com"

  ## Pod affinity, node selector and tolerations
  ##
  affinity: {}
  nodeSelector: {}
  tolerations: []

