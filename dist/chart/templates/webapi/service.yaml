{{- if and .Values.webapi .Values.webapi.enable }}
apiVersion: v1
kind: Service
metadata:
    labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/name: {{ include "nebari-operator.name" . }}
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: webapi
    name: {{ include "nebari-operator.webapiName" . }}
    namespace: {{ .Release.Namespace }}
spec:
    type: {{ .Values.webapi.service.type }}
    ports:
        - port: {{ .Values.webapi.service.port }}
          targetPort: 8080
          protocol: TCP
          name: http
    selector:
        app.kubernetes.io/name: {{ include "nebari-operator.name" . }}
        app.kubernetes.io/component: webapi
{{- end }}
