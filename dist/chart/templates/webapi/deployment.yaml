{{- if and .Values.webapi .Values.webapi.enable }}
apiVersion: apps/v1
kind: Deployment
metadata:
    labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        app.kubernetes.io/name: {{ include "nebari-operator.name" . }}
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: webapi
    name: {{ include "nebari-operator.webapiName" . }}
    namespace: {{ .Release.Namespace }}
spec:
    replicas: {{ .Values.webapi.replicas }}
    selector:
        matchLabels:
            app.kubernetes.io/name: {{ include "nebari-operator.name" . }}
            app.kubernetes.io/component: webapi
    template:
        metadata:
            labels:
                app.kubernetes.io/name: {{ include "nebari-operator.name" . }}
                helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
                app.kubernetes.io/instance: {{ .Release.Name }}
                app.kubernetes.io/managed-by: {{ .Release.Service }}
                app.kubernetes.io/component: webapi
        spec:
            {{- with .Values.webapi.imagePullSecrets }}
            imagePullSecrets: {{ toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.webapi.tolerations }}
            tolerations: {{ toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.webapi.affinity }}
            affinity: {{ toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.webapi.nodeSelector }}
            nodeSelector: {{ toYaml . | nindent 12 }}
            {{- end }}
            serviceAccountName: {{ include "nebari-operator.webapiName" . }}
            containers:
                - name: api
                  image: "{{ .Values.webapi.image.repository }}:{{ .Values.webapi.image.tag }}"
                  imagePullPolicy: {{ .Values.webapi.image.pullPolicy }}
                  ports:
                      - containerPort: 8080
                        name: http
                        protocol: TCP
                  env:
                      {{- if .Values.webapi.env }}
                      {{- toYaml .Values.webapi.env | nindent 20 }}
                      {{- else }}
                      []
                      {{- end }}
                  livenessProbe:
                      httpGet:
                          path: /api/v1/health
                          port: 8080
                      initialDelaySeconds: 10
                      periodSeconds: 30
                  readinessProbe:
                      httpGet:
                          path: /api/v1/health
                          port: 8080
                      initialDelaySeconds: 5
                      periodSeconds: 10
                  resources:
                      {{- if .Values.webapi.resources }}
                      {{- toYaml .Values.webapi.resources | nindent 20 }}
                      {{- else }}
                      {}
                      {{- end }}
                  securityContext:
                      {{- if .Values.webapi.securityContext }}
                      {{- toYaml .Values.webapi.securityContext | nindent 20 }}
                      {{- else }}
                      {}
                      {{- end }}
                  volumeMounts:
                      - name: pins-data
                        mountPath: /data
            securityContext:
                {{- if .Values.webapi.podSecurityContext }}
                {{- toYaml .Values.webapi.podSecurityContext | nindent 14 }}
                {{- else }}
                {}
                {{- end }}
            volumes:
                - name: pins-data
                  emptyDir: {}
            terminationGracePeriodSeconds: 10
{{- end }}
