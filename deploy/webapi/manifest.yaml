---
# Source: nebari-operator/templates/webapi/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
    labels:
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: nebari-operator
        helm.sh/chart: nebari-operator-0.1.0
        app.kubernetes.io/instance: nebari-operator
        app.kubernetes.io/component: webapi
    name: webapi
    namespace: nebari-system
spec:
    replicas: 1
    selector:
        matchLabels:
            app.kubernetes.io/name: nebari-operator
            app.kubernetes.io/component: webapi
    template:
        metadata:
            labels:
                app.kubernetes.io/name: nebari-operator
                helm.sh/chart: nebari-operator-0.1.0
                app.kubernetes.io/instance: nebari-operator
                app.kubernetes.io/managed-by: Helm
                app.kubernetes.io/component: webapi
        spec:
            serviceAccountName: webapi
            containers:
                - name: api
                  image: "quay.io/nebari/nebari-webapi:latest"
                  imagePullPolicy: IfNotPresent
                  ports:
                      - containerPort: 8080
                        name: http
                        protocol: TCP
                  env:
                    # JWT validation
                    - name: ENABLE_AUTH
                      value: "true"
                    - name: KEYCLOAK_URL
                      value: https://keycloak.nebari.example.com
                    - name: KEYCLOAK_ISSUER_URL
                      value: https://keycloak.nebari.example.com
                    - name: KEYCLOAK_REALM
                      value: nebari
                    # Keycloak admin credentials — same Secret + namespace as the operator.
                    # The webapi service account holds a RoleBinding in the keycloak
                    # namespace (see rbac.yaml) so it can read this secret directly
                    # without copying or syncing it into nebari-system.
                    - name: KEYCLOAK_ADMIN_SECRET_NAME
                      value: nebari-realm-admin-credentials
                    - name: KEYCLOAK_ADMIN_SECRET_NAMESPACE
                      value: keycloak
                    # Admin access-control
                    - name: ADMIN_GROUP
                      value: admin
                    # Persistent stores (bbolt)
                    - name: ACCESS_REQUESTS_DB_PATH
                      value: /data/access_requests.db
                    - name: NOTIFICATIONS_DB_PATH
                      value: /data/notifications.db
                    - name: PINS_DB_PATH
                      value: /data/pins.db
                    - name: PORT
                      value: "8080"
                    - name: HEALTH_INTERVAL
                      value: "30"
                  livenessProbe:
                      httpGet:
                          path: /api/v1/health
                          port: 8080
                      initialDelaySeconds: 10
                      periodSeconds: 30
                  readinessProbe:
                      httpGet:
                          path: /api/v1/health
                          port: 8080
                      initialDelaySeconds: 5
                      periodSeconds: 10
                  resources:
                    limits:
                      cpu: 500m
                      memory: 512Mi
                    requests:
                      cpu: 100m
                      memory: 128Mi
                  securityContext:
                    allowPrivilegeEscalation: false
                    capabilities:
                      drop:
                      - ALL
                    readOnlyRootFilesystem: true
                  volumeMounts:
                      - name: pins-data
                        mountPath: /data
            securityContext:
              runAsNonRoot: true
              runAsUser: 65532
              seccompProfile:
                type: RuntimeDefault
            volumes:
                - name: pins-data
                  emptyDir: {}
            terminationGracePeriodSeconds: 10
---
# Source: nebari-operator/templates/webapi/service.yaml
apiVersion: v1
kind: Service
metadata:
    labels:
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: nebari-operator
        helm.sh/chart: nebari-operator-0.1.0
        app.kubernetes.io/instance: nebari-operator
        app.kubernetes.io/component: webapi
    name: webapi
    namespace: nebari-system
spec:
    type: ClusterIP
    ports:
        - port: 8080
          targetPort: 8080
          protocol: TCP
          name: http
    selector:
        app.kubernetes.io/name: nebari-operator
        app.kubernetes.io/component: webapi
