---
# Source: nebari-operator/templates/webapi/rbac.yaml
# Role in the keycloak namespace so the webapi service account can read the
# admin Secret there directly — no ExternalSecret sync or copy job needed.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    labels:
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: nebari-operator
        app.kubernetes.io/component: webapi
    name: webapi-keycloak-secret-reader
    namespace: keycloak
rules:
    - apiGroups: [""]
      resources: ["secrets"]
      verbs: ["get"]
---
# Source: nebari-operator/templates/webapi/rbac.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    labels:
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/name: nebari-operator
        app.kubernetes.io/component: webapi
    name: webapi-keycloak-secret-reader
    namespace: keycloak
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: webapi-keycloak-secret-reader
subjects:
