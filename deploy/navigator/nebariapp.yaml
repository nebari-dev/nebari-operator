apiVersion: reconcilers.nebari.dev/v1
kind: NebariApp
metadata:
  name: navigator
  namespace: nebari-system
spec:
  hostname: navigator.nebari.example.com
  service:
    name: navigator
    port: 8080
  routing:
    tls:
      enabled: true
  # Landing page itself is publicly accessible
  # Frontend handles authentication via Keycloak client
  auth:
    enabled: false
  landingPage:
    enabled: true
    displayName: "Nebari Portal"
    description: "Central hub for all Nebari services"
    icon: "dashboard"
    category: "Platform"
    priority: 1
    visibility: "public"
